services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    command: sh -c "npm install && npm run dev -- --hostname 0.0.0.0"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      APP_BASE_URL: http://localhost:3000
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-dev_client_id}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-dev_client_secret}
      GITHUB_OAUTH_REDIRECT_URI: http://localhost:3000/api/auth/github/callback
      GITHUB_ADMIN_USERS: ${GITHUB_ADMIN_USERS:-yokeay}
      GITHUB_OAUTH_SCOPES: read:user
      AUTH_SESSION_SECRET: ${AUTH_SESSION_SECRET:-dev_random_secret}
      DATABASE_URL: postgresql://dev:dev@postgres:5432/ddmusic_dev
      REDIS_URL: redis://redis:6379/0
      REDIS_KEY_PREFIX: bendywork_ddmusic_nextjs_
      REDIS_CACHE_TTL_SECONDS: 60
      DOCS_REPO_SYNC_ENABLED: ${DOCS_REPO_SYNC_ENABLED:-false}
      DOCS_REPO_SYNC_BRANCH: ${DOCS_REPO_SYNC_BRANCH:-main}
      DOCS_REPO_TOKEN_ENV: GITHUB_REPO_TOKEN
      GITHUB_REPO_TOKEN: ${GITHUB_REPO_TOKEN:-}
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - app_node_modules:/app/node_modules
      - next_cache:/app/.next
    stdin_open: true
    tty: true

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ddmusic_dev
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: dev
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dev -d ddmusic_dev"]
      interval: 5s
      timeout: 5s
      retries: 20
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    command: redis-server --save 60 1 --loglevel warning
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  app_node_modules:
  next_cache:
  postgres_data:
  redis_data:
